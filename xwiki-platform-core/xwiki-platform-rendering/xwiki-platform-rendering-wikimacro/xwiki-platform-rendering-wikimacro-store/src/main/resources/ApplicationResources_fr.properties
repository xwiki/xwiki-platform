###############################################################################
# XWiki Core localization
#
# This contains the translations of the module in the default language
# (generally English).
# 
# Translation key syntax:
#   <short top level project name>.<short module name>.<propertyName>
#   where:
#   * <short top level project name> = top level project name without the "xwiki-" prefix,
#                                     for example: commons, rendering, platform, enterprise, manager, etc
#   * <short module name> = the name of the Maven module without the <short top level project name> prefix,
#                           for example: oldcore, scheduler, activitystream, etc
#   * <propertyName> = the name of the property using camel case,
#                      for example updateJobClassCommitComment
#
# Comments: it's possible to add some detail about a key to make easier to
#   translate it by adding a comment before it. To make sure a comment is not
#   assigned to the following key use at least three sharps (###) for the comment
#   or after it.
# 
# Deprecated keys:
#   * when deleting a key it should be moved to deprecated section at the end
#     of the file (between #@deprecatedstart and #@deprecatedend) and associated to the
#     first version in which it started to be deprecated
#   * when renaming a key, it should be moved to the same deprecated section
#     and a comment should be added with the following syntax:
#     #@deprecated new.key.name
#     old.key.name=Some translation
###############################################################################

### Wiki macros classes
XWiki.WikiMacroClass_id=Identifiant de la macro
XWiki.WikiMacroClass_id_hint=L'identifiant de la macro est aussi ce qui sera utilis\u00E9 dans la syntaxe, par exemple\u00A0: {{yourId /}}.
XWiki.WikiMacroClass_name=Nom de la macro
XWiki.WikiMacroClass_name_hint=Le nom de la macro affich\u00E9 dans l'interface d'\u00E9dition.
XWiki.WikiMacroClass_description=Description de la macro
XWiki.WikiMacroClass_description_hint=La description de la macro affich\u00E9e dans l'interface d'\u00E9dition.
XWiki.WikiMacroClass_defaultCategory=Cat\u00E9gorie par d\u00E9faut
XWiki.WikiMacroClass_defaultCategory_hint=La cat\u00E9gorie de la macro qui sera affich\u00E9e dans l'interface d'\u00E9dition.
XWiki.WikiMacroClass_supportsInlineMode=Support du mode en ligne
XWiki.WikiMacroClass_supportsInlineMode_hint=Si non, la macro affichera une erreur lorsqu'utilisée en ligne.
XWiki.WikiMacroClass_visibility=Visibilit\u00E9 de la macro
XWiki.WikiMacroClass_visibility_Current\ User=Utilisateur courant
XWiki.WikiMacroClass_visibility_Current\ Wiki=Wiki courant
XWiki.WikiMacroClass_visibility_Global=Globale
XWiki.WikiMacroClass_contentType=Disponibilit\u00E9 du contenu de la macro
XWiki.WikiMacroClass_contentOrder=Propri\u00E9t\u00E9 de l'orde du contenu
XWiki.WikiMacroClass_contentOrder_hint=Pr\u00E9cise l'ordre d'affichage du param\u00E8tre de contenu par rapport aux autres param\u00E8tres de la macro wiki dans l'interface de configuration.
XWiki.WikiMacroClass_contentType_Optional=Optionnel
XWiki.WikiMacroClass_contentType_Mandatory=Obligatoire
XWiki.WikiMacroClass_contentType_No\ content=No content
XWiki.WikiMacroClass_contentJavaType=Type de contenu de la macro
XWiki.WikiMacroClass_contentJavaType_Wiki=Wiki
XWiki.WikiMacroClass_contentJavaType_Unknown=Inconnu
XWiki.WikiMacroClass_contentDescription=Description du contenu (non applicable en cas de macro "Sans contenu")
XWiki.WikiMacroClass_code=Code de la macro
XWiki.WikiMacroClass_async_enabled=Rendu asynchrone
XWiki.WikiMacroClass_async_cached=Mis en cache
XWiki.WikiMacroClass_async_context=\u00C9l\u00E9ments du contexte
XWiki.WikiMacroClass_priority=Priorité
XWiki.WikiMacroClass_executionIsolated=Ex\u00E9cution isol\u00E9e
XWiki.WikiMacroClass_executionIsolated_hint=Si l'exécution de la macro ne modifie pas le XDOM (y compris au travers de l'exécution d'autres macros, par exemple analysées ŕ partir du contenu d'une autre page). Lire le XDOM et lire et écrire d'autres informations contextuelles est accepté. Considérer l'exécution de la macro comme isolée améliore la rapidité de son exécution.
XWiki.WikiMacroParameterClass_name=Nom du param\u00E8tre
XWiki.WikiMacroParameterClass_name_hint=Le nom du paramčtre est celui utilisé dans la syntaxe : par exemple {{yourMacro paramName="xx" /}}. Vous pouvez utiliser une clé de traduction telle que render.macro.yourMacro.parameter.paramName.name pour modifier le nom affiché dans l'interface utilisateur de l'éditeur.
XWiki.WikiMacroParameterClass_description=Description du param\u00E8tre
XWiki.WikiMacroParameterClass_description_hint=Description du param\u00E8tre. Cela peut aussi \u00EAtre traduit avec une cl\u00E9 de type rendering.macro.yourMacro.parameter.paramName.description
XWiki.WikiMacroParameterClass_mandatory=Param\u00E8tre obligatoire
XWiki.WikiMacroParameterClass_mandatory_hint=Si oui alors le paramčtre doit obligatoirement ętre renseigné sinon le paramčtre est optionnel. Note : ce choix peut impacter la visibilité du paramčtre.
XWiki.WikiMacroParameterClass_defaultValue=Valeur par d\u00E9faut du param\u00E8tre
XWiki.WikiMacroParameterClass_defaultValue_hint=La valeur par défaut ne doit ętre utilisée que pour les paramčtres optionnels et elle permet d'éviter de définir une valeur lors de l'utilisation de la macro. Il ne doit pas ętre considéré comme un espace réservé pour une valeur dans l'interface utilisateur de l'éditeur.
XWiki.WikiMacroParameterClass_type=Type du param\u00E8tre
XWiki.WikiMacroParameterClass_type_hint=Inconnu signifie qu'il sera considéré comme une valeur de chaîne, Wiki signifie que la syntaxe wiki de la page sera utilisée, puis il est possible d'indiquer n'importe quel type personnalisé ŕ condition que son nom =qualifié soit donné, par exemple java.util.List.
XWiki.WikiMacroParameterClass_feature=Fonctionnalit\u00E9s du param\u00E8tre
XWiki.WikiMacroParameterClass_feature_hint=Les paramčtres liés ŕ la męme fonctionnalité sont mutuellement exclusifs. Notez qu'une fonctionnalité peut ętre associée ŕ un groupe, dans ce cas, tous les paramčtres d'un groupe seront liés ŕ la męme fonctionnalité.
XWiki.WikiMacroParameterClass_group=Groupe du param\u00E8tre
XWiki.WikiMacroParameterClass_group_hint=Permet de regrouper les param\u00E8tres dans l'interface.
XWiki.WikiMacroParameterClass_deprecated=Param\u00E8tre d\u00E9pr\u00E9ci\u00E9
XWiki.WikiMacroParameterClass_hidden=Paramčtre masqué
XWiki.WikiMacroParameterClass_hidden_hint=Si oui, le param\u00E8tre ne sera jamais affich\u00E9 dans l'interface d'\u00E9dition, mais il pourra \u00EAtre utilis\u00E9 en mode syntaxe.
XWiki.WikiMacroParameterClass_advanced=Param\u00E8tre avanc\u00E9
XWiki.WikiMacroParameterClass_advanced_hint=Si oui, le param\u00E8tre sera toujours accessible au travers d'une section d\u00E9ployable dans l'\u00E9diteur.
XWiki.WikiMacroParameterClass_featureMandatory=Param\u00E8tre de la fonctionnait\u00E9 obligatoire.
XWiki.WikiMacroParameterClass_featureMandatory_hint=Si oui, alors tous les paramčtres liés ŕ la fonctionnalité sont facultatifs néanmoins au moins l'un d'eux doit ętre renseigné.
XWiki.WikiMacroParameterClass_order=Paramčtre d'ordre
XWiki.WikiMacroParameterClass_order_hint=Définit l'ordre du paramčtre dans l'UI de configuration de la macro : plus la value est faible et plus la priorité d'affichage est élevée.
rendering.wikimacro.error.failedResolveContentPlaceholder=Impossible d'évaluer le contenu provenant de la macro
rendering.wikimacro.error.failedResolveParameterPlaceholder=Impossible d'évaluer la chaîne de remplacement de la macro
