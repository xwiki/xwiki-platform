extension.security.analysis.advice.upgradeFromEM=Dès qu''une version corrigée sera disponible, cette extension pourra être mise à jour depuis {0}.
extension.security.analysis.advice.upgradeFromEM.0=gestionnaire d'extension
extension.security.analysis.advice.transitive=L'extension a été installée comme dépendance d'une autre extension. Il n'est pas conseillé de la mettre à jour manuellement. Vous devriez plutôt mettre à jour les extensions listées ci-dessous.
extension.security.analysis.advice.upgradeXWiki=Cette extension est fournie directement par XWiki et ne peut pas être mise à jour par le gestionnaire d'extension. Merci de surveiller la sortie de nouvelles versions d'XWiki. Veuillez également noter que vous devriez vérifier dans les notes de version de cette extension si elle a bénéficié d'une mise à jour de sécurité.
extension.security.analysis.advice.upgradeEnvironment=Veuillez surveiller les sorties de nouvelles versions de votre environnement d'installation (c'est à dire le servlet container) incluant des correctifs de sécurité et faites les mises à jour en conséquence.
