rendering.macro.attachmentSelector.name=Attachment Selector
rendering.macro.attachmentSelector.description=A control to be used for object properties of the current page that are supposed to contain the name of an attachment from the current (or target) page. Allows uploading new attachments, and deleting attachments from the target page.  If no target page is specified, the current page will be used. Object properties are only saved to the current page.
rendering.macro.attachmentSelector.parameter.classname.name=classname
rendering.macro.attachmentSelector.parameter.classname.description=The full name of the page holding the XClass that contains the property associated with this picker.
rendering.macro.attachmentSelector.parameter.property.name=property
rendering.macro.attachmentSelector.parameter.property.description=The name of the property associated with the picker.
rendering.macro.attachmentSelector.parameter.object.name=object
rendering.macro.attachmentSelector.parameter.object.description=The identifier (number) of the object for which the property is displayed by this picker. If missing, the first instance of the class given by the parameter classname found in the page will be considered.
rendering.macro.attachmentSelector.parameter.cssClass.description=A CSS class for the element surrounding the property value.
rendering.macro.attachmentSelector.parameter.cssClass.name=cssClass
rendering.macro.attachmentSelector.parameter.savemode.description=States how the property is updated. Accepted values: "form" (default)  meaning that the selected value is stored in an input that will be saved via an external form; "direct" means that the picker is responsible with updating the property value.
rendering.macro.attachmentSelector.parameter.savemode.name=savemode
rendering.macro.attachmentSelector.parameter.buttontext.description=Text of the button that triggers the picker. Defaults to $services.localization.render('xe.attachmentSelector.selectFile').
