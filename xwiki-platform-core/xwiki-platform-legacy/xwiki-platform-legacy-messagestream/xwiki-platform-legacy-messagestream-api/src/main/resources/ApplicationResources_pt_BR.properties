rendering.macro.messageSender.parameter.visibilityParameter.description=Alguns níveis de visibilidade (como 'user' e 'group') aceitam um parâmetro. No caso de 'user' e 'group', por exemplo, o valor pode ser uma referęncia em série de um documento de usuário ou de grupo.
rendering.macro.messageSender.parameter.visibilityOptions.name=opçőes de visibilidade
rendering.macro.messageSender.parameter.visibilityOptions.description=Lista separada por vírgulas, das opçőes de visibilidade que a macro deve permitir ao usuário escolher.\nTem que ser um subconjunto, podendo ser todas, daquelas que săo as padrőes: 'everyone', 'followers', 'group', 'user'.
