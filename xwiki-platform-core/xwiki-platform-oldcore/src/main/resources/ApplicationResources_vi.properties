rendering.macro.cache.parameter.timeToLive.description=The number of seconds to cache the content.
rendering.macro.cache.parameter.maxEntries.name=maxEntries
rendering.macro.cache.parameter.maxEntries.description=The maximum number of entries in the cache (Least Recently Used entries are ejected).
rendering.macro.comment.name=Comment
rendering.macro.comment.description=Allows putting comments in the source content. This macro doesn't output anything.
