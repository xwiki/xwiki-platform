rendering.macro.messageSender.name=Mitteilung eingeben
rendering.macro.messageSender.description=Ein Gadget, welches es erlaubt, Mitteilungen auf der Seite einzugeben, welche dann im Aktivitätsverlauf des Benutzers angezeigt werden.
rendering.macro.messageSender.parameter.visibility.name=Sichtbarkeit
rendering.macro.messageSender.parameter.visibility.description=Vorbelegung für die Sichtbarkeit, wenn das Makro angezeigt wird.\nWenn nichts angegeben wird, ermittelt das Makro automatisch einen Wert, abhängig davon, wo das Gadget angezeigt wird.\nGültige Werte sind: 'everyone' (für alle), 'followers' (Mitverfolger), 'group' (Eine Gruppe kann ausgewählt werden), 'user' (Ein Benutzer kann ausgewählt werden).
rendering.macro.messageSender.parameter.visibilityParameter.name=Vorbelegung Benutzer/Gruppe
rendering.macro.messageSender.parameter.visibilityParameter.description=Bei den Sichtbarkeitsoptionen 'user' und 'group' muss angegeben werden, welcher Benutzer bzw. welche Gruppe die Mitteilung sehen darf. Dafür kann hier optional eine Vorbelegung in Form eines vollständigen Verweises auf einen Benutzer oder eine Gruppe erfolgen, z.B. 'XWiki.XWikiAdminGroup'.
rendering.macro.messageSender.parameter.visibilityOptions.name=Auswahl für Sichtbarkeit
rendering.macro.messageSender.parameter.visibilityOptions.description=Ein Komma-separierte Liste von Optionen zum Einstellen der Sichtbarkeit, die das Gadget dem Benutzer anbietet.\nDie Optionen sollten aus der Menge der gültigen Werte ausgewählt werden, d.h. 'everyone', 'followers', 'group', 'user'.
