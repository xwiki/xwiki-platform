rendering.macro.dashboard.name=Dashboard
rendering.macro.dashboard.description=A macro to define a dashboard to fill with gadgets.
rendering.macro.dashboard.parameter.layout.name=layout
rendering.macro.dashboard.parameter.layout.description=The identifier of the layout to use for this dashboard (e.g. columns, etc). If none specified, columns will be used.
rendering.macro.dashboard.parameter.style.name=Style
rendering.macro.dashboard.parameter.style.description=The identifier of the style to be used for this dashboard. No style means that the gadgets will be rendered plain, as content of the page. "panels" style will render the gadgets the same as the panels. Note that this is used as the CSS class of the top level block of the dashboard, so you can pass any value to create your own dashboard style.
rendering.macro.dashboard.parameter.source.name=Source
rendering.macro.dashboard.parameter.source.description=The source of the dashboard macro, as a page reference, where the gadget configurations (objects) should be read from. By default the current page will be used. Example: Dashboard.WebHome.
rendering.macro.gallery.name=Gallery
rendering.macro.gallery.description=Displays the images found in the provided content using a slide-show view.
rendering.macro.gallery.content.description=The images to be displayed in the gallery. All the images found in the provided wiki content are included. Images should be specified using the syntax of the current page. Example, for XWiki 2.0 syntax: image:Space.Page@alice.png image:http://www.example.com/path/to/bob.jpg
