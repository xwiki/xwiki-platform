attachment.validation.mimetype.rejected=Les administrateurs du wiki ont d\u00E9fini une restriction de type de fichiers pour les pi\u00E8ces jointes. Merci de vous assurer que le type de fichier que vous essayez de joindre est autoris\u00E9 ({0}) et non bloqu\u00E9 ({1}).
attachment.validation.filesize.rejected=Les administrateurs du wiki ont défini une restriction de taille pour les fichiers joints ({0} octets). Veuillez choisir un fichier plus petit.
attachment.validation.inputStream.error=Impossible de valider la pičce jointe, car la lecture du fichier est en échec. Merci de réessayer plus tard.
attachment.validation.attachmentValidationStep.error=Impossible de valider la pičce-jointe, car il n'est pas possible de charger l'outil de validation.
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_allowedMimetypes=Types de fichiers autorisés
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_allowedMimetypes_hint=Définir la liste des types de fichiers autorisés comme pičces jointes. Par défaut, cette liste est vide, mais vous pouvez définir une liste de types autorisés, en les séparant par des virgules. Notez qu'un astérisque (*) peut ętre utilisé pour accepter tout type de fichier multimédia. Une fois que la liste n'est plus vide, toute pičce jointe n'étant pas dans la liste sera rejetée. Par exemple, si vous voulez autoriser seulement les fichiers en texte brut et les images de tout type, vous pouvez définir la liste comme suit : text/plain,image/*
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_blockedMimetypes=Types de fichiers bloqués
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_blockedMimetypes_hint=Définir la liste des types de fichiers bloqués comme pičces jointes. Par défaut, cette liste est vide, mais vous pouvez définir une liste de types bloqués, en les séparant par des virgules. Notez qu'un astérisque (*) peut ętre utilisé pour accepter tout type de fichier multimédia. Une fois que la liste n'est plus vide, toute pičce jointe étant dans la liste sera rejetée. Par exemple, si vous voulez refuser les fichiers en texte brut et les images de tout type, vous pouvez définir la liste comme suit : text/plain,image/*
