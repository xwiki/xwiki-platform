rendering.macro.messageSender.parameter.visibility.name=visibilidade
rendering.macro.messageSender.parameter.visibility.description=Visibilidade padrăo selecionada quando a macro é exibida.\nSe năo informado, é determinada pela página onde a macro está sendo usada.\nValores válidos: 'everyone', 'followers', 'group' ou 'user'.
