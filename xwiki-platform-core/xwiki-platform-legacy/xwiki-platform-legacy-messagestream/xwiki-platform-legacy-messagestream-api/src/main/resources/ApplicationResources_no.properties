rendering.macro.messageSender.parameter.visibility.name=synlighet
rendering.macro.messageSender.parameter.visibility.description=Standard valgt synlighet nĺr makroen vises.\nHvis det ikke er spesifisert, bestemmes det automatisk basert pĺ siden der makroen brukes.\nGyldige verdier er: 'everyone', 'followers', 'group' or 'user'.
