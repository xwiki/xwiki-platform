rendering.macro.spaceindex.parameter.sort.name=sort
rendering.macro.spaceindex.parameter.sort.description=Optional parameter to choose the sorting of the list of pages.\nValid values are: 'creationDate': sort by creation date (default), 'modificationDate': sort by update date, or 'docName': sort alphabetically.
