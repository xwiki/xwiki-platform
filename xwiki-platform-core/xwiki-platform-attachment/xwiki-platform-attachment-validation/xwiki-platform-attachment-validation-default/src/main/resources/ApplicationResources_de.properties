attachment.validation.mimetype.rejected=Die Wiki-Administratoren haben eine Mimetype-Beschränkung für angehängte Dateien definiert. Stellen Sie sicher, dass der Mimetyp der Dateien, die Sie anhängen möchten, zulässig ({0}) und nicht blockiert ({1}) ist.
attachment.validation.filesize.rejected=Die Wiki-Administratoren haben eine Dateigrößenbeschränkung für angehängte Dateien definiert ({0} Bytes). Bitte wählen Sie eine kleinere Datei aus.
attachment.validation.inputStream.error=Unmöglich, den Anhang zu validieren, da die Datei nicht gelesen werden konnte. Bitte versuchen Sie es später erneut.
attachment.validation.attachmentValidationStep.error=Es ist nicht möglich, den Anhang zu validieren, da die Validatoren nicht geladen werden konnten.
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_allowedMimetypes=Zulässige Mimetypen
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_allowedMimetypes_hint=Definieren Sie die Liste der zulässigen Mimetypen für Anhänge. Standardmäßig ist diese Liste leer, aber Sie können eine durch Kommas getrennte Liste zulässiger Mimetypen angeben. Beachten Sie, dass ein Joker (*) verwendet werden kann, um jeden Medientyp zu akzeptieren. Wenn diese Liste nicht leer ist, wird jeder Anhang mit einem nicht aufgelisteten Mimetyp zurückgewiesen. Wenn Sie beispielsweise nur einfachen Text und beliebige Bilder akzeptieren möchten, können Sie die Liste auf Folgendes setzen: text/plain,image/*
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_blockedMimetypes=Blockierte Mimetypen
XWiki.Attachment.Validation.Code.AttachmentMimetypeRestrictionClass_blockedMimetypes_hint=Definieren Sie die Liste der blockierten Mimetypen für Anhänge. Standardmäßig ist diese Liste leer, aber Sie können eine durch Kommas getrennte Liste blockierter Mimetypen angeben. Beachten Sie, dass ein Joker (*) verwendet werden kann, um jeden Medientyp zu akzeptieren. Wenn diese Liste nicht leer ist, wird jeder Anhang, der einem der aufgelisteten Mimetypen entspricht, abgelehnt. Wenn Sie beispielsweise einfachen Text und jede Art von Bildern ablehnen möchten, können Sie die Liste auf Folgendes setzen: text/plain,image/*
