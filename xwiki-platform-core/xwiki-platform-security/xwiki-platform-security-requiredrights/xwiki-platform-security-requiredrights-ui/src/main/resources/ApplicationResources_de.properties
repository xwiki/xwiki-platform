security.requiredrights.ui.modal.unsupportedRights=Die folgenden Rechte werden derzeit von dieser Seite benötigt, können hier aber nicht konfiguriert werden. Wenn du in diesem Dialogfeld auf \u201ESpeichern\u201C klickst, werden sie entfernt. Bitte bearbeite sie mit dem Objekt-Editor, um sie anzupassen:
