security.requiredrights.confirmationChecker.addedRights=Das Bearbeiten dieser Seite kann dazu führen, dass derzeit deaktivierte Skripte ausgeführt werden, die möglicherweise schädlich sind. Wenn du diese Seite bearbeitest, gewährst du den Elementen auf dieser Seite die folgenden Rechte:
security.requiredrights.confirmationChecker.removedRights=Das Bearbeiten dieser Seite kann zu Fehlern führen, da dir die folgenden Rechte fehlen:
security.requiredrights.confirmationChecker.footnoteChar=*
security.requiredrights.confirmationChecker.footnoteSentence={0}: muss manuell geprüft werden, siehe Details unten.
security.requiredrights.confirmationChecker.showDetails=Details anzeigen
security.requiredrights.confirmationChecker.hideDetails=Details ausblenden
security.requiredrights.confirmationChecker.advanced.explanations.addedRights=Wenn du diese Seite speicherst, erhalten die unten aufgeführten Elemente Zugriffsrechte, über die sie derzeit nicht verfügen. Dies könnte möglicherweise zur Ausführung von Schadcode führen. Bitte überprüfe die Elemente sorgfältig, bevor du fortfährst, oder klicke auf \u201EAbbrechen\u201C.
security.requiredrights.confirmationChecker.advanced.explanations.removedRights=Wenn du diese Seite speicherst, werden die derzeitigen Berechtigungen der unten aufgeführten Elemente geändert. Dies könnte möglicherweise zu Fehlfunktionen führen, z. B. dass Makros aufgrund unzureichender Berechtigungen nicht ausgeführt werden können. Bitte überprüfe die Elemente sorgfältig, bevor du fortfährst, oder klicke auf \u201EAbbrechen\u201C.

