extension.security.analysis.advice.upgradeFromEM=Sobald eine neue Version mit einem Fix zur Verfügung steht, kann diese Erweiterung von {0} aktualisiert werden.
extension.security.analysis.advice.upgradeFromEM.0=Erweiterungsmanager
extension.security.analysis.advice.transitive=Diese Erweiterung wird installiert, weil sie von einer anderen Erweiterung benötigt wird. Es wird nicht empfohlen, sie manuell zu aktualisieren. Stattdessen solltest Du die Erweiterung, die sie benötigt, aktualisieren. Bitte schau Dir die unten aufgeführten Erweiterungen an.
extension.security.analysis.advice.upgradeXWiki=Diese Erweiterung wird direkt von XWiki bereitgestellt und kann nicht über den Erweiterungsmanager aktualisiert werden. Bitte achte auf neue Versionen von XWiki. Beachte, dass Du in den Versionshinweisen überprüfen solltest, ob diese Erweiterung auf eine Version mit einer Sicherheitsbehebung aktualisiert wurde.
extension.security.analysis.advice.upgradeEnvironment=Bitte achte auf neue Versionen Deiner Umgebung (z. B. Servlet-Engine) mit einer Sicherheitsbehebung und aktualisiere sie entsprechend.
