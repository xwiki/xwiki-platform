###############################################################################
# Required rights UI localization
#
# This contains the translations of the module in the default language
# (generally English).
#
# Translation key syntax:
#   <short top level project name>.<short module name>.<propertyName>
#   where:
#   * <short top level project name> = top level project name without the "xwiki-" prefix,
#                                     for example: commons, rendering, platform, enterprise, manager, etc
#   * <short module name> = the name of the Maven module without the <short top level project name> prefix,
#                           for example: oldcore, scheduler, activitystream, etc
#   * <propertyName> = the name of the property using camel case,
#                      for example updateJobClassCommitComment
#
# Comments: it's possible to add some detail about a key to make easier to
#   translate it by adding a comment before it. To make sure a comment is not
#   assigned to the following key use at least three sharps (###) for the comment
#   or after it.
#
# Deprecated keys:
#   * when deleting a key it should be moved to deprecated section at the end
#     of the file (between #@deprecatedstart and #@deprecatedend) and associated to the
#     first version in which it started to be deprecated
#   * when renaming a key, it should be moved to the same deprecated section
#     and a comment should be added with the following syntax:
#     #@deprecated new.key.name
#     old.key.name=Some translation
###############################################################################

security.requiredrights.ui.informationLabel=Erforderliche Rechte
security.requiredrights.ui.enforcedNoRight=Diese Seite erfordert bestimmte Berechtigungen, es sind jedoch keine konkret angegeben. Die Bearbeitungsberechtigung reicht aus, um diese Seite zu bearbeiten, und auf den Inhalt der Seite werden keine Berechtigungen angewendet.
security.requiredrights.ui.enforced=Für diese Seite gelten bestimmte Berechtigungsanforderungen. Die folgenden Berechtigungen sind erforderlich, um diese Seite zu bearbeiten, und gelten für ihren Inhalt:
security.requiredrights.ui.notEnforced=Diese Seite beansprucht keinerlei Rechte. Für den Inhalt der Seite gelten die Rechte ihres letzten Autors.
security.requiredrights.ui.right.script=Skript-Rechte
security.requiredrights.ui.right.admin=Administratorrechte auf Wiki-Ebene
security.requiredrights.ui.right.programming=Programmier-Rechte
security.requiredrights.ui.missingRequiredRightsWarning=Dem Inhalt dieses Dokuments fehlt eine erforderliche Berechtigung. Überprüfe die erforderlichen Berechtigungen, um sie hinzuzufügen.
security.requiredrights.ui.maybeMissingRequiredRight=Dem Inhalt dieses Dokuments fehlt möglicherweise ein erforderliches Recht, aber die automatische Analyse konnte nicht feststellen, ob es tatsächlich notwendig ist. Überprüfe die erforderlichen Rechte, um zu entscheiden, ob es hinzugefügt werden sollte.
security.requiredrights.ui.maybeTooManyRequiredRights=Der Inhalt dieses Dokuments benötigt das konfigurierte erforderliche Recht vielleicht gar nicht, aber die automatische Analyse konnte nicht feststellen, ob es tatsächlich notwendig ist. Überprüfe die erforderlichen Rechte, um festzustellen, ob weniger Rechte vielleicht ausreichen würden.
security.requiredrights.ui.tooManyRequiredRights=Laut der automatisierten Analyse benötigt der Inhalt dieses Dokuments die konfigurierte erforderliche Berechtigung nicht. Überprüfe die erforderlichen Berechtigungen, um sie zu entfernen.
security.requiredrights.ui.suggestEnforcing=Überprüfe die erforderlichen Berechtigungen und setze sie durch, um die Sicherheit dieser Seite zu erhöhen.
security.requiredrights.ui.reviewRequiredRightsButton=Erforderliche Rechte prüfen
security.requiredrights.ui.modal.label=Erforderliche Rechte
security.requiredrights.ui.modal.rightsSelection=Wähle das Recht, dass durchgesetzt werden soll, aus
security.requiredrights.ui.modal.rightsSelection.hint=Jedes Recht umfasst alle Rechte, die diesem vorausgehen.
security.requiredrights.ui.modal.noEnforceOption=Erzwinge keine erforderlichen Rechte
security.requiredrights.ui.modal.noEnforceOption.hint1=Skripte und Objekte werden mit den Rechten des letzten Autors ausgeführt.
security.requiredrights.ui.modal.noEnforceOption.hint2=Jeder, der Bearbeitungsrechte hat, kann die Seite bearbeiten.
security.requiredrights.ui.modal.enforceOption=Erzwinge die erforderlichen Rechte
security.requiredrights.ui.modal.enforceOption.hint1=Skripte und Objekte werden nur mit den ausgewählten Rechten ausgeführt.
security.requiredrights.ui.modal.enforceOption.hint2=Nur Nutzer mit Bearbeitungsrechten und den ausgewählten Rechten können die Seite bearbeiten.

# The following warning is displayed in the unlikely situation that rights are configured that can't be handled by
